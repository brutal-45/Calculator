<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="bolt" x1="180" y1="60" x2="340" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bolt2" x1="220" y1="120" x2="300" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#roundClip)" opacity="0.08">
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
  </g>

  <!-- Shadow bolt -->
  <path d="M290 100 L200 280 L260 280 L220 412 L340 230 L270 230 Z"
        fill="black" opacity="0.2" transform="translate(8,8)"/>

  <!-- Main bolt shape -->
  <path d="M290 100 L200 280 L260 280 L220 412 L340 230 L270 230 Z"
        fill="url(#bolt)"/>

  <!-- Bolt highlight -->
  <path d="M280 120 L210 275 L255 275 L235 390 L320 240 L265 240 Z"
        fill="url(#bolt2)" opacity="0.6"/>

  <!-- Inner bolt edge line -->
  <path d="M290 100 L200 280 L260 280 L220 412 L340 230 L270 230 Z"
        fill="none" stroke="#D97706" stroke-width="2" opacity="0.5"/>

  <!-- Small sparkle -->
  <circle cx="365" cy="140" r="6" fill="#FDE68A" opacity="0.7"/>
  <circle cx="145" cy="380" r="4" fill="#FDE68A" opacity="0.5"/>

  <!-- Top shine -->
  <g clip-path="url(#roundClip)" opacity="0.1">
    <rect x="0" y="0" width="512" height="180" fill="white"/>
  </g>
</svg>
