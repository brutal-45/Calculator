<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse"> 
      <stop offset="0%" stop-color="#10B981"/> 
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="boltMain" x1="190" y1="80" x2="330" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FEF3C7"/>
      <stop offset="40%" stopColor="#FBBF24"/>
      <stop offset="100%" stopColor="#F59E0B"/>
    </linearGradient>
    <linearGradient id="boltInner" x1="210" y1="120" x2="310" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FFFBEB"/>
      <stop offset="100%" stopColor="#FDE68A"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#34D399"/>
      <stop offset="100%" stopColor="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="boltShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#92400E" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Outer shadow -->
  <rect width="512" height="512" rx="108" fill="#047857" filter="url(#shadow)" opacity="0.5"/>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="url(#rimGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Grid pattern -->
  <g clip-path="url(#roundClip)" opacity="0.06">
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1.5"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1.5"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="256" cy="256" r="80" fill="none" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- BT text (brand mark) -->
  <g clip-path="url(#roundClip)" opacity="0.12">
    <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="220" font-weight="900" fill="white" letter-spacing="-10">BT</text>
  </g>

  <!-- Bolt shadow -->
  <g clip-path="url(#roundClip)" filter="url(#boltShadow)">
    <path d="M296 108 L206 268 L258 268 L222 404 L342 224 L284 224 Z" fill="#92400E" opacity="0.3" transform="translate(6,6)"/>
  </g>

  <!-- Bolt outline glow -->
  <g clip-path="url(#roundClip)" filter="url(#glow)" opacity="0.3">
    <path d="M296 108 L206 268 L258 268 L222 404 L342 224 L284 224 Z" fill="#FBBF24"/>
  </g>

  <!-- Main bolt -->
  <path d="M296 108 L206 268 L258 268 L222 404 L342 224 L284 224 Z" fill="url(#boltMain)" clip-path="url(#roundClip)"/>

  <!-- Bolt inner highlight -->
  <path d="M286 128 L218 264 L256 264 L234 384 L324 228 L282 228 Z" fill="url(#boltInner)" opacity="0.5" clip-path="url(#roundClip)"/>

  <!-- Bolt edge -->
  <path d="M296 108 L206 268 L258 268 L222 404 L342 224 L284 224 Z" fill="none" stroke="#B45309" stroke-width="1.5" opacity="0.4" clip-path="url(#roundClip)"/>

  <!-- Small sparkles -->
  <circle cx="370" cy="132" r="5" fill="#FDE68A" opacity="0.6" clip-path="url(#roundClip)"/>
  <circle cx="148" cy="388" r="3.5" fill="#FDE68A" opacity="0.4" clip-path="url(#roundClip)"/>
  <circle cx="380" cy="310" r="2.5" fill="#FDE68A" opacity="0.3" clip-path="url(#roundClip)"/>

  <!-- Top shine highlight -->
  <g clip-path="url(#roundClip)" opacity="0.12">
    <rect x="0" y="0" width="512" height="200" rx="108" fill="url(#topShine)"/>
  </g>
  <defs>
    <linearGradient id="topShine" x1="256" y1="0" x2="256" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="white"/>
      <stop offset="100%" stopColor="transparent"/>
    </linearGradient>
  </defs>
</svg>
